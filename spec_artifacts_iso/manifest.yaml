manifest_version: 1.0.0
name: spec-artifacts-iso
version: 0.1.0
description: "Filament Module: ISO-style spec artifacts (FR, NFR, StR, US, IT, TC, AC, CON) — unified-shape archetypes (frontmatter schema + body_extraction asserts) validated by quire-rs; per-archetype authoring skeletons are the source of truth (no render templates); iso-spec-core grammar"
archetypes:
- kind: spec
  name: Spec
  description: Container holding ISO-style requirement artifacts
  doc_backed: true
  supports_membership: true
  composition:
    expected_artifacts:
    - StR
    - FR
    - NFR
    - US
    - IT
    - TC
grammars:
- name: iso-spec-core
  version: 0.1.0
  description: ISO-style requirements spec grammar
  doc_kinds:
  - spec
artifact_types:
- name: FR
  grammar_ref: iso-spec-core
  frontmatter_schema_ref: schemas/fr-frontmatter.schema.json
  defaults:
    id_pattern: FR-{next:03d}
  allowed_links:
  - calls
  - publishes
  - consumes
  - triggers
  - reads
  - writes
  - requires
  - implements
  - depends_on
  - contains
  - transitions_to
  - references
  - constrains
  - supersedes
  examples: []
  lint_rules_ref: []
  body_extraction:
    yield_pattern:
      match:
        description:
          from: section_body
          after_heading: Description
          required: true
          assert:
            level: 2
        specification:
          from: heading
          level: 2
          regex: ^Specification$
          required: true
          assert:
            level: 2
        inputs:
          from: section_body
          after_heading: Inputs
          required: true
          assert:
            level: 3
        outputs:
          from: section_body
          after_heading: Outputs
          required: true
          assert:
            level: 3
        behavior:
          from: section_body
          after_heading: Behavior
          required: true
          assert:
            level: 3
        constraints_table:
          from: table_row
          under_section: Constraints
          required: true
          assert:
            columns:
            - ID
            - Constraint
            - Type
            - Validation
            min_rows: 1
            id_column: ID
            id_pattern: '^{id}-CON-\d+$'
        acceptance_criteria:
          from: section_body
          after_heading: Acceptance Criteria
          required: true
          assert:
            level: 2
        acceptance_criteria_table:
          from: table_row
          under_section: Acceptance Criteria
          required: true
          assert:
            columns:
            - ID
            - Criteria
            - Verification
            min_rows: 1
            id_column: ID
            id_pattern: '^{id}-AC-\d+$'
        dependencies:
          from: section_body
          after_heading: Dependencies
          required: true
          assert:
            level: 2
- name: NFR
  grammar_ref: iso-spec-core
  frontmatter_schema_ref: schemas/nfr-frontmatter.schema.json
  defaults:
