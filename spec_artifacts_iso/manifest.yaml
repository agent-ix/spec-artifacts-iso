manifest_version: 1.0.0
name: spec-artifacts-iso
version: 0.1.0
description: "Filament Module: ISO-style spec artifact templates (FR, NFR, StR, US, IT, TC, AC, CON) \u2014 Jinja .md.j2 templates + frontmatter JSON Schemas + iso-spec-core grammar"
archetypes:
- kind: spec
  name: Spec
  description: Container holding ISO-style requirement artifacts
  doc_backed: true
  supports_membership: true
  composition:
    expected_artifacts:
    - StR
    - FR
    - NFR
    - US
    - IT
    - TC
grammars:
- name: iso-spec-core
  version: 0.1.0
  description: ISO-style requirements spec grammar
  doc_kinds:
  - spec
artifact_types:
- name: FR
  grammar_ref: iso-spec-core
  template_ref: templates/fr.md.j2
  frontmatter_schema_ref: schemas/fr-frontmatter.schema.json
  required_sections:
  - name: Description
    level: 2
  - name: Specification
    level: 2
  - name: Acceptance Criteria
    level: 2
  - name: Dependencies
    level: 2
  defaults:
    id_pattern: FR-{next:03d}
  allowed_links:
  - calls
  - publishes
  - consumes
  - triggers
  - reads
  - writes
  - requires
  - implements
  - depends_on
  - contains
  - transitions_to
  - references
  - constrains
  - supersedes
  examples: []
  lint_rules_ref: []
- name: NFR
  grammar_ref: iso-spec-core
  template_ref: templates/nfr.md.j2
  frontmatter_schema_ref: schemas/nfr-frontmatter.schema.json
  required_sections:
  - name: Description
    level: 2
  - name: Dependencies
    level: 2
  defaults:
    id_pattern: NFR-{next:03d}
  allowed_links:
  - constrains
  - references
  - depends_on
  examples: []
  lint_rules_ref: []
- name: StR
  grammar_ref: iso-spec-core
  template_ref: templates/str.md.j2
  frontmatter_schema_ref: schemas/str-frontmatter.schema.json
