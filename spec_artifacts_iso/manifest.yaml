    level: 2
  - name: Dependencies
    level: 2
  defaults:
    id_pattern: US-{next:03d}
  allowed_links:
  - satisfied_by
  - traces_to
  - references
  examples: []
  lint_rules_ref: []
- name: IT
  grammar_ref: iso-spec-core
  template_ref: templates/it.md.j2
