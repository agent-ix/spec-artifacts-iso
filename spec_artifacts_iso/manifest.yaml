manifest_version: 1.0.0
name: spec-artifacts-iso
version: 0.1.0
description: "Filament Module: ISO-style spec artifacts (FR, NFR, StR, US, IT, TC) — unified-shape archetypes (frontmatter schema + body_extraction asserts) validated by quire-rs; per-archetype authoring skeletons are the source of truth (no render templates); iso-spec-core grammar"
archetypes:
- kind: spec
  name: Spec
  description: Container holding ISO-style requirement artifacts
  doc_backed: true
  supports_membership: true
  composition:
    expected_artifacts:
    - StR
    - FR
    - NFR
    - US
    - IT
    - TC
grammars:
- name: iso-spec-core
  version: 0.1.0
  description: ISO-style requirements spec grammar
  doc_kinds:
  - spec
artifact_types:
- name: FR
  grammar_ref: iso-spec-core
  frontmatter_schema_ref: schemas/fr-frontmatter.schema.json
  defaults:
    id_pattern: FR-{next:03d}
  allowed_links:
  - calls
  - publishes
  - consumes
  - triggers
  - reads
  - writes
  - requires
  - implements
  - depends_on
  - contains
  - transitions_to
  - references
  - constrains
  - supersedes
  - specifies
  examples: []
  lint_rules_ref: []
  # Format-walkthrough decisions #1-#4 (2026-06-11): the `## Specification`
  # umbrella was never intended — Inputs/Outputs/Behavior are level-2
  # sections and OPTIONAL (object-kind FRs carry their kind's anchors
  # instead); Constraints is optional (no filler rows). Description +
  # AC table + Dependencies remain the required FR core.
  body_extraction:
    yield_pattern:
      match:
        description:
          from: section_body
          after_heading: Description
          required: true
          assert:
            level: 2
        inputs:
          from: section_body
          after_heading: Inputs
          required: false
          assert:
            level: 2
        outputs:
          from: section_body
          after_heading: Outputs
          required: false
          assert:
            level: 2
        behavior:
          from: section_body
          after_heading: Behavior
          required: false
          assert:
            level: 2
        constraints_table:
          from: table_row
          under_section: Constraints
          required: false
          assert:
            columns:
            - ID
            - Constraint
            - Type
            - Validation
            min_rows: 1
            id_column: ID
            id_pattern: '^{id}-CON-\d+$'
        acceptance_criteria:
          from: section_body
          after_heading: Acceptance Criteria
          required: true
          assert:
            level: 2
        acceptance_criteria_table:
          from: table_row
          under_section: Acceptance Criteria
          required: true
          assert:
            columns:
            - ID
            - Criteria
            - Verification
            min_rows: 1
            id_column: ID
            id_pattern: '^{id}-AC-\d+$'
        dependencies:
          from: section_body
          after_heading: Dependencies
          required: true
          assert:
            level: 2
- name: NFR
  grammar_ref: iso-spec-core
  frontmatter_schema_ref: schemas/nfr-frontmatter.schema.json
  defaults:
    id_pattern: NFR-{next:03d}
  allowed_links:
  - constrains
  - references
  - depends_on
  examples: []
  lint_rules_ref: []
  # Format-walkthrough decision #9 (2026-06-11): required NFR core is
  # Statement + Measurement and Evaluation table + Verification.
  # `quality_attribute` moved to FRONTMATTER (enum over ISO 25010
  # attributes, see schemas/nfr-frontmatter.schema.json) — the old
  # one-line `## Quality Attribute` section is retired. Scope /
  # Rationale / Dependencies / Acceptance Criteria are optional.
  body_extraction:
    yield_pattern:
      match:
        quality_attribute:
          from: frontmatter_field
          path:
          - quality_attribute
          required: false
        statement:
          from: section_body
          after_heading: Statement
          required: true
          assert:
            level: 2
        scope:
          from: section_body
          after_heading: Scope
          required: false
          assert:
            level: 2
        rationale:
          from: section_body
          after_heading: Rationale
          required: false
          assert:
            level: 2
        measurement_and_evaluation:
          from: section_body
          after_heading: Measurement and Evaluation
          required: true
          assert:
            level: 2
        measurement_table:
          from: table_row
          under_section: Measurement and Evaluation
          required: true
          assert:
            columns:
            - Metric
            - Target
            - Threshold
            - Method
            min_rows: 1
        verification:
          from: section_body
          after_heading: Verification
          required: true
          assert:
            level: 2
        acceptance_criteria:
          from: section_body
          after_heading: Acceptance Criteria
          required: false
          assert:
            level: 2
        dependencies:
          from: section_body
          after_heading: Dependencies
          required: false
          assert:
            level: 2
- name: StR
  grammar_ref: iso-spec-core
  frontmatter_schema_ref: schemas/str-frontmatter.schema.json
  defaults:
    id_pattern: StR-{next:03d}
  allowed_links:
  - satisfied_by
  - depends_on
  - references
  examples: []
  lint_rules_ref: []
  # ISO-standard (2026-06-16): required StR core is Stakeholder Need +
  # Rationale + Validation Criteria (ISO/IEC/IEEE 29148 stakeholder-requirement
  # triad — the need, why it exists, and how its satisfaction is judged).
  # Stakeholders / context / constraints / dependencies / priority / notes /
  # traceability are optional.
  body_extraction:
    yield_pattern:
      match:
        stakeholder_need:
          from: section_body
          after_heading: Stakeholder Need
          required: true
          assert:
            level: 2
        rationale:
          from: section_body
          after_heading: Rationale
          required: true
          assert:
            level: 2
        validation_criteria:
          from: section_body
          after_heading: Validation Criteria
          required: true
          assert:
            level: 2
        stakeholders:
          from: section_body
          after_heading: Stakeholders
          required: false
          assert:
            level: 2
        context_and_assumptions:
          from: section_body
          after_heading: Context and Assumptions
          required: false
          assert:
            level: 2
        stakeholder_constraints:
          from: section_body
          after_heading: Stakeholder Constraints (Contextual)
          required: false
          assert:
            level: 2
        dependencies:
          from: section_body
          after_heading: Dependencies
          required: false
          assert:
            level: 2
        priority_and_risk:
          from: section_body
          after_heading: Priority and Risk (Informative)
          required: false
          assert:
            level: 2
        notes:
          from: section_body
          after_heading: Notes (Informative)
          required: false
          assert:
            level: 2
        traceability:
          from: section_body
          after_heading: Traceability
          required: false
          assert:
            level: 2
- name: US
  grammar_ref: iso-spec-core
  frontmatter_schema_ref: schemas/us-frontmatter.schema.json
  defaults:
    id_pattern: US-{next:03d}
  allowed_links:
  - satisfied_by
  - traces_to
  - references
  examples: []
  lint_rules_ref: []
  # ISO-standard (2026-06-16): required US core is just `Story` (ISO/IEC/IEEE
  # 29148 user-story shape — As a / I want / So that, enforced by a `matches`
  # regex). Every other section is OPTIONAL and contextual/informative — a US
  # carries discovery context, not normative requirements.
  body_extraction:
    yield_pattern:
      match:
        story:
          from: section_body
          after_heading: Story
          required: true
          assert:
            level: 2
            matches: '(?is)\bas an?\b.+\bi want\b.+\bso that\b'
        context:
          from: section_body
          after_heading: Context
          required: false
          assert:
            level: 2
        acceptance_examples:
          from: section_body
          after_heading: Acceptance Examples (Illustrative)
          required: false
          assert:
            level: 2
        options:
          from: section_body
          after_heading: Options (Exploratory)
          required: false
          assert:
            level: 2
        constraints:
          from: section_body
          after_heading: Constraints (Contextual)
          required: false
          assert:
            level: 2
        dependencies:
          from: section_body
          after_heading: Dependencies (Contextual)
          required: false
          assert:
            level: 2
        priority_and_risk:
          from: section_body
          after_heading: Priority and Risk (Informative)
          required: false
          assert:
            level: 2
        notes:
          from: section_body
          after_heading: Notes (Informative)
          required: false
          assert:
            level: 2
        traceability:
          from: section_body
          after_heading: Traceability (Informative)
          required: false
          assert:
            level: 2
- name: IT
  grammar_ref: iso-spec-core
  frontmatter_schema_ref: schemas/it-frontmatter.schema.json
  defaults:
    id_pattern: IT-{next:03d}
  allowed_links:
  - verifies
  - depends_on
  - references
  examples: []
  lint_rules_ref: []
  # ISO-standard (2026-06-16): ISO/IEC/IEEE 29119 integration-test core is the
  # six-section required set — Objective, Target Integration, Preconditions,
  # Inputs, Test Procedure, Expected Results. Metadata / dependencies / notes /
  # traceability are optional.
  body_extraction:
    yield_pattern:
      match:
        objective:
          from: section_body
          after_heading: Objective
          required: true
          assert:
            level: 2
        target_integration:
          from: section_body
          after_heading: Target Integration
          required: true
          assert:
            level: 2
        preconditions:
          from: section_body
          after_heading: Preconditions
          required: true
          assert:
            level: 2
        inputs:
          from: section_body
          after_heading: Inputs
          required: true
          assert:
            level: 2
        test_procedure:
          from: section_body
          after_heading: Test Procedure
          required: true
          assert:
            level: 2
        expected_results:
          from: section_body
          after_heading: Expected Results
          required: true
          assert:
            level: 2
        metadata:
          from: section_body
          after_heading: Metadata
          required: false
          assert:
            level: 2
        dependencies:
          from: section_body
          after_heading: Dependencies
          required: false
          assert:
            level: 2
        notes:
          from: section_body
          after_heading: Notes
          required: false
          assert:
            level: 2
        traceability:
          from: section_body
          after_heading: Traceability
          required: false
          assert:
            level: 2
- name: TC
  grammar_ref: iso-spec-core
  frontmatter_schema_ref: schemas/tc-frontmatter.schema.json
  defaults:
    id_pattern: TC-{next:03d}
  allowed_links:
  - verifies
  - references
  examples: []
  lint_rules_ref: []
  # ISO-standard (2026-06-16): minimal test-case core (ISO/IEC/IEEE 29119
  # test-case essentials) — Description, Test Procedure, Expected Results.
  body_extraction:
    yield_pattern:
      match:
        description:
          from: section_body
          after_heading: Description
          required: true
          assert:
            level: 2
        test_procedure:
          from: section_body
          after_heading: Test Procedure
          required: true
          assert:
            level: 2
        expected_results:
          from: section_body
          after_heading: Expected Results
          required: true
          assert:
            level: 2
# ISO-standard (2026-06-16): AC and CON archetypes removed — zero corpus usage.
# Acceptance Criteria are carried by the FR `## Acceptance Criteria` table and
# Constraints by the FR `## Constraints` table; standalone AC/CON artifacts are
# redundant with that normative FR structure.
- name: master-requirements
  grammar_ref: iso-spec-core
  frontmatter_schema_ref: schemas/master-requirements-frontmatter.schema.json
  allowed_links:
  - depends_on
  - calls
  - publishes
  - consumes
  - reads
  - writes
  - triggers
  - requires
  - implements
  - references
  examples: []
  lint_rules_ref: []
  body_extraction:
    yield_pattern:
      match:
        title:
          from: heading
          level: 1
          regex: ^Master Requirements Specification$
          required: true
          assert:
            level: 1
        purpose:
          from: section_body
          after_heading: Purpose
          required: true
          assert:
            level: 2
        scope:
          from: heading
          level: 2
          regex: ^Scope$
          required: true
          assert:
            level: 2
        system_overview:
          from: heading
          level: 2
          regex: ^System Overview$
          required: true
          assert:
            level: 2
        requirements_architecture:
          from: heading
          level: 2
          regex: ^Requirements Architecture$
          required: true
          assert:
            level: 2
        references:
          from: section_body
          after_heading: References
          required: true
          assert:
            level: 2
# OKF reserved bundle files (index.md / log.md): first-class authored
# artifacts, validated like any other. Routed by frontmatter `type`
# (`index` / `log`). index.md navigation uses relative links that are
# LOCAL to the content — they are not knowledge-graph edges (ix:// owns
# those). log.md is non-normative authored history.
- name: index
  grammar_ref: iso-spec-core
  frontmatter_schema_ref: schemas/index-frontmatter.schema.json
  allowed_links: []
  examples: []
  lint_rules_ref: []
  body_extraction:
    yield_pattern:
      match:
        contents:
          from: section_body
          after_heading: Contents
          required: true
          assert:
            level: 2
- name: log
  grammar_ref: iso-spec-core
  frontmatter_schema_ref: schemas/log-frontmatter.schema.json
  allowed_links: []
  examples: []
  lint_rules_ref: []
  body_extraction:
    yield_pattern:
      match:
        history:
          from: section_body
          after_heading: History
          required: true
          assert:
            level: 2
doc_kinds:
- spec
object_types: []
# Advisory lint rules (quire-rs FR-036; format-walkthrough decision #14):
# AC Verification cells use the ISO 29148 verification methods, optionally
# annotated with test-case references — `Test (TC-035)`. Evaluated by
# `quire lint`; never blocks validation/extraction/sync.
lint_rules:
- type: table_column_values
  id: ac-verification-method
  archetypes: [FR]
  section: Acceptance Criteria
  column: Verification
  allowed: [Inspection, Analysis, Demonstration, Test]
  annotation_pattern: '\(TC-\d+(,\s*TC-\d+)*\)'
  severity: warning
# ISO-standard (2026-06-16): normative-language + per-step success-criteria
# advisories (quire-rs FR-036 `section_body_pattern`). The body of the named
# section must contain a match for `pattern`; a missing section produces no
# finding (structural presence is validation's job). Advisory only — `quire
# lint` reports these and never blocks validation/extraction/sync.
- type: section_body_pattern
  id: fr-shall-language
  archetypes: [FR]
  section: Description
  pattern: '(?i)\b(shall|must|require)'
  message: "FR Description should use normative language (shall/must) per ISO/IEC/IEEE 29148."
  severity: warning
- type: section_body_pattern
  id: nfr-shall-language
  archetypes: [NFR]
  section: Statement
  pattern: '(?i)\b(shall|must|require)'
  message: "NFR Statement should use normative language (shall/must) per ISO/IEC/IEEE 29148."
  severity: warning
- type: section_body_pattern
  id: str-shall-language
  archetypes: [StR]
  section: Stakeholder Need
  pattern: '(?i)\b(shall|must|require)'
  message: "Stakeholder Need should state a normative expectation (shall/must/require) per ISO/IEC/IEEE 29148."
  severity: warning
- type: section_body_pattern
  id: it-success-criteria
  archetypes: [IT]
  section: Test Procedure
  pattern: '\bIT-\d+-SC-\d+'
  message: "Integration Test Procedure should declare per-step success criteria (IT-XXX-SC-NN)."
  severity: warning
